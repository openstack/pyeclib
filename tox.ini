[tox]
envlist = py3{10,11,12}-compilelibs,pep8,docs

[testenv]
deps =
  -r{toxinidir}/test-requirements.txt
commands=
    pytest -v test/
setenv = LIBERASURECODE_DIR={envdir}/liberasurecode
    NASM_DIR={envdir}/nasm
    ISAL_DIR={envdir}/isa-l
    JERASURE_DIR={envdir}/jerasure
    GFCOMPLETE_DIR={envdir}/gf-complete
    compilelibs: LDFLAGS=-L{envdir}/lib -Wl,-rpath,{envdir}/lib
passenv = LIBERASURECODE_REF
allowlist_externals =
    compilelibs: {toxinidir}/tools/pip-install-with-liberasurecode.sh
install_command =
    compilelibs: {toxinidir}/tools/pip-install-with-liberasurecode.sh {opts} {packages}
    !compilelibs: pip install {opts} {packages}

[testenv:pep8]
skip_install = True
deps=
    hacking
    black~=26.0
    mypy
commands=
    flake8 pyeclib/ setup.py test/ pack_wheel.py
    black --check --diff --target-version py310 --line-length 79 pyeclib/ tools/ test/ setup.py doc/ pack_wheel.py pyeclib_c.pyi
    mypy --python-version 3.10 --disallow-untyped-defs pyeclib

[testenv:venv]
commands = {posargs}

[testenv:docs]
deps =
  -r{toxinidir}/doc/requirements.txt
commands =
  sphinx-build -W -b html -d doc/build/doctrees doc/source doc/build/html

[testenv:pdf-docs]
deps = {[testenv:docs]deps}
allowlist_externals =
  make
commands =
  sphinx-build -W -b latex doc/source doc/build/pdf
  make -C doc/build/pdf

[flake8]
# E203: whitespace before ‘,’, ‘;’, or ‘:’
# H101: Use TODO(NAME)
# H404: multi line docstring should start without a leading new line
# H405: multi line docstring summary not separated with an empty line
# W503: line break before binary operator
ignore = E203,H101,H404,H405,W503
